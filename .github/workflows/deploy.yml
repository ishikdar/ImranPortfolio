name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/public/pages/* _site/
          cp -r site/public/{css,js,data} _site/
          cp -r site/distribution _site/
          cp -r site/public/assets _site/ 2>/dev/null || mkdir -p _site/assets
          find _site -name "*.html" -exec sed -i \
            -e 's|../css/|css/|g' \
            -e 's|../assets/|assets/|g' \
            -e 's|../js/|js/|g' \
            -e 's|../../distribution/|distribution/|g' {} \;

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4